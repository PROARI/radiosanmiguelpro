<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio San Miguel | Online 24 Horas</title>
    <meta name="description"
        content="Escucha Radio San Miguel en vivo. Disfruta de la mejor música online las 24 horas del día.">

    <link rel="icon" href="LOGO.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#FF0080">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Radio Lider">
    <link rel="apple-touch-icon" href="LOGO.png">

    <!-- Fonts e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>


    <style>
        :root {
            --main-color: #FF0080;
        }

        audio {
            display: none !important;
        }

        /* Aplicar color dinámico a elementos clave */
        #playPauseButton,
        .chat-button,
        .btn-install,
        .btn-share-option {
            background: var(--main-color) !important;
            color: #fff !important;
            /* Letras blancas para contraste en fucsia */
        }

        .chat-button i {
            color: #fff !important;
        }

        .live-indicator {
            background: rgba(255, 0, 128, 0.1) !important;
            /* 10% transparencia */
            color: var(--main-color) !important;
            border-color: rgba(255, 0, 128, 0.2) !important;
        }

        .live-dot,
        .live-dot::after {
            background-color: var(--main-color) !important;
            border-color: rgba(255, 0, 128, 0.4) !important;
        }

        .social-icon:hover {
            background: var(--main-color) !important;
            color: #fff !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="theme-toggle" id="themeToggle">
            <i data-lucide="moon"></i>
        </button>

        <div id="currentDateTime" class="current-date-time current-date-time-left">
            <span id="currentDate"></span>
            <span id="currentTime"></span>
            <span id="currentTemperature"></span>
        </div>

        <div class="center-content">


            <div class="radio-image">
                <img id="mainRadioImage" src="LOGO.png" alt="Cover Art">
            </div>

            <div class="song-badge">
                <i data-lucide="music" style="width:18px; margin-right: 5px; opacity:0.8;"></i>
                <div class="song-title-container">
                    <div id="songTitle" class="scroll-text">Estás Escuchando Radio San Miguel | 24 Horas Online</div>
                </div>
            </div>


            <div class="action-panel">
                <a href="https://wa.me/59176100065
" target="_blank" class="chat-button" id="chatButton">
                    <i class="bi bi-whatsapp"></i>
                    <span>COMUNICATE</span>
                </a>
            </div>
        </div>

        <div class="social-links-group">
            <a href="https://www.facebook.com/radiosanmiguelriberalta" target="_blank" class="social-icon" title="Facebook">
                <i class="bi bi-facebook"></i>
            </a>
            <a href="#" target="_blank" class="social-icon" title="Twitter / X">
                <i class="bi bi-twitter-x"></i>
            </a>
            <a href="#" target="_blank" class="social-icon" title="Instagram">
                <i class="bi bi-instagram"></i>
            </a>
            <a href="#" target="_blank" class="social-icon" title="TikTok">
                <i class="bi bi-tiktok"></i>
         </a>
        </div>

        <div class="player-controls">
            <div class="station-info">
                <img id="playerStationImage" src="LOGO.png" alt="Station Logo">
                <div>
                    <div class="station-name">Radio San Miguel</div>
                    <div class="live-indicator alternative">
                        EN VIVO
                        <div class="live-dot"></div>
                    </div>
                </div>
            </div>

            <div class="playback-controls">
                <button id="playPauseButton">
                    <i data-lucide="play"></i>
                </button>
            </div>

            <div class="extra-controls">
                <div class="volume-control">
                    <i data-lucide="volume-2" id="muteToggle"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                    <span id="volumePercentage">100%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Visualizador único de ancho completo -->
    <div class="visualizer is-wave">
        <canvas id="audioVisualizer"></canvas>
    </div>

    <!-- MODALES -->
    <div id="shareModal" class="share-modal">
        <div class="share-content">
            <button id="closeShare" class="close-share">&times;</button>
            <h3>Compartir Radio</h3>
            <p>¡Corre la voz y comparte el mejor ritmo espectacular!</p>
            <div class="share-options">
                <button id="copyLink" class="btn-share-option">
                    <i class="bi bi-link-45deg"></i>
                    <span>Copiar Enlace</span>
                </button>
            </div>
            <div id="shareMessage" class="share-message">¡Enlace copiado!</div>
        </div>
    </div>

    <div id="pwaModal" class="pwa-modal">
        <div class="pwa-content">
            <div class="pwa-header">
                <img src="LOGO.png" alt="Icono App" class="pwa-icon">
                <button id="closePwa" class="close-pwa">&times;</button>
            </div>
            <div class="pwa-body">
                <h2 id="pwaTitle">¡Instala Radio Lider!</h2>
                <p id="pwaDesc">Accede a todas las funciones desde tu dispositivo, fácil y rápido.</p>
            </div>
            <div class="pwa-footer">
                <button id="installApp" class="btn-install">INSTALAR AHORA</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous" src="https://stream.zeno.fm/q8vp7qq4k0hvv"></audio>

    <script>
        // Inyectar configuración a JS
        window.APP_CONFIG = {
            "emisora": {
                "nombre": "San Miguel",
                "streaming_url": "https://stream.zeno.fm/q8vp7qq4k0hvv",
                "api_url": "", // Leave empty as no API for now
                "timezone": "America/Lima",
                "color_principal": "#FF0080"
            },
            "contacto": {
                "whatsapp": "59172450169",
                "google_play": "#",
                "app_store": "#"
            },
            "redes_sociales": [
                { "nombre": "Facebook", "url": "#", "icono": "bi-facebook", "activo": true },
                { "nombre": "Twitter / X", "url": "#", "icono": "bi-twitter-x", "activo": true },
                { "nombre": "Instagram", "url": "#", "icono": "bi-instagram", "activo": true },
                { "nombre": "TikTok", "url": "#", "icono": "bi-tiktok", "activo": true }
            ],
            "imagenes": {
                "logo_principal": "LOGO.png",
                "logo_pwa": "LOGO.png",
                "logo_centro": "LOGO.png"
            },
            "pwa": {
                "nombre": "Radio Lider",
                "nombre_corto": "Radio Lider"
            }
        };
    </script>
    <script src="script.js"></script>
    <script src="share.js"></script>
</body>

</html>
